<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Buddy — Connect</title>
  <link rel="stylesheet" href="style.css">
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .page-wrap {
      flex: 1;
    }

    .site-footer {
      margin-top: auto;
    }

    .connect-layout {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 1.5rem;
    }

    /* Sidebar tabs */
    .sidebar-tabs {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      position: sticky;
      top: 80px;
    }

    .sidebar-tabs h3 {
      padding: 1.1rem 1.2rem .8rem;
      font-size: .88rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--ink3);
      border-bottom: 1px solid var(--border);
    }

    .stab {
      display: flex;
      align-items: center;
      gap: .7rem;
      padding: .8rem 1.2rem;
      cursor: pointer;
      font-size: .9rem;
      font-weight: 500;
      color: var(--ink2);
      transition: all var(--transition);
      border-left: 3px solid transparent;
    }

    .stab:hover {
      background: var(--surface2);
    }

    .stab.active {
      background: var(--gold-pale);
      color: var(--gold);
      border-left-color: var(--gold);
    }

    .stab .ti {
      font-size: 1rem;
    }

    /* Sections */
    .connect-section {
      display: none;
    }

    .connect-section.active {
      display: block;
    }

    /* Match cards */
    .match-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
      margin-top: 1rem;
    }

    .match-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.2rem;
      text-align: center;
      box-shadow: var(--shadow);
      transition: all var(--transition);
    }

    .match-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .match-avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      margin: 0 auto .7rem;
    }

    .match-name {
      font-weight: 600;
      font-size: .95rem;
    }

    .match-sub {
      font-size: .78rem;
      color: var(--ink3);
      margin: .25rem 0 .8rem;
    }

    /* Chat layout */
    .chat-shell {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--surface);
      box-shadow: var(--shadow);
      height: 520px;
    }

    .user-list {
      border-right: 1px solid var(--border);
      overflow-y: auto;
    }

    .user-item {
      padding: .8rem 1rem;
      cursor: pointer;
      transition: background var(--transition);
      border-bottom: 1px solid var(--border);
    }

    .user-item:hover,
    .user-item.active {
      background: var(--gold-pale);
    }

    .user-item .un {
      font-size: .9rem;
      font-weight: 500;
    }

    .user-item .ul {
      font-size: .75rem;
      color: var(--ink3);
      margin-top: .1rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-area {
      display: flex;
      flex-direction: column;
    }

    .chat-head {
      padding: .9rem 1.2rem;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: .92rem;
      background: var(--surface2);
    }

    .chat-msgs {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: .5rem;
    }

    .msg {
      max-width: 72%;
      padding: .5rem .9rem;
      border-radius: 10px;
      font-size: .88rem;
      line-height: 1.5;
    }

    .msg.them {
      background: var(--surface2);
      color: var(--ink);
      border-radius: 2px 10px 10px 10px;
    }

    .msg.me {
      background: var(--gold);
      color: #fff;
      align-self: flex-end;
      border-radius: 10px 10px 2px 10px;
    }

    .msg-attachment {
      display: block;
      margin-top: .4rem;
      padding: .3rem .5rem;
      background: rgba(0, 0, 0, .1);
      border-radius: 4px;
      font-size: .78rem;
      text-decoration: none;
      color: inherit;
    }

    .chat-input-row {
      padding: .7rem .9rem;
      border-top: 1px solid var(--border);
      display: flex;
      gap: .5rem;
    }

    .chat-input-row input {
      flex: 1;
    }

    /* Groups */
    .group-list {
      display: flex;
      flex-direction: column;
      gap: .6rem;
      margin-top: 1rem;
    }

    .group-item {
      display: flex;
      align-items: center;
      gap: .9rem;
      padding: .85rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: all var(--transition);
    }

    .group-item:hover {
      border-color: var(--gold2);
      background: var(--gold-pale);
    }

    .group-item.active {
      border-color: var(--gold);
      background: var(--gold-pale);
    }

    .group-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .group-info {
      flex: 1;
    }

    .group-info .gn {
      font-weight: 600;
      font-size: .92rem;
    }

    .group-info .gm {
      font-size: .76rem;
      color: var(--ink3);
    }

    @media(max-width:680px) {
      .connect-layout {
        grid-template-columns: 1fr;
      }

      .sidebar-tabs {
        position: static;
        display: flex;
        flex-direction: row;
        border-radius: 10px;
      }

      .sidebar-tabs h3 {
        display: none;
      }

      .stab {
        flex: 1;
        justify-content: center;
        border-left: none;
        border-bottom: 3px solid transparent;
        padding: .7rem .5rem;
      }

      .stab.active {
        border-left-color: transparent;
        border-bottom-color: var(--gold);
      }

      .chat-shell {
        grid-template-columns: 1fr;
        height: auto;
      }

      .user-list {
        display: none;
      }
    }

    /* ===== ENHANCED ANIMATIONS ===== */
    .card,
    .feat-card,
    .stat-chip,
    .note-row,
    .task-item,
    .conn-card,
    .quiz-card {
      animation: fadeUp .5s cubic-bezier(.4, 0, .2, 1) both;
    }

    .task-item {
      transition: all .22s cubic-bezier(.4, 0, .2, 1);
    }

    .task-item:hover {
      transform: translateX(4px);
      border-color: rgba(201, 135, 58, .3);
      box-shadow: 0 4px 16px rgba(26, 18, 8, .1);
    }

    .task-check {
      transition: all .3s cubic-bezier(.34, 1.56, .64, 1) !important;
    }

    .task-check.checked {
      transform: scale(1.15);
      animation: checkBounce .4s cubic-bezier(.34, 1.56, .64, 1);
    }

    @keyframes checkBounce {
      0% {
        transform: scale(0);
      }

      60% {
        transform: scale(1.3);
      }

      100% {
        transform: scale(1);
      }
    }

    .stat-chip {
      transition: all .22s ease;
      cursor: default;
    }

    .stat-chip:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(26, 18, 8, .12);
      border-color: rgba(201, 135, 58, .25);
    }

    .stat-chip .sc-val {
      transition: transform .3s cubic-bezier(.34, 1.56, .64, 1);
    }

    .stat-chip:hover .sc-val {
      transform: scale(1.1);
    }

    .section-title::after {
      background: linear-gradient(90deg, var(--gold), var(--border), transparent);
      animation: titleLine 2s ease both;
    }

    @keyframes titleLine {
      from {
        transform: scaleX(0);
        transform-origin: left;
      }

      to {
        transform: scaleX(1);
        transform-origin: left;
      }
    }

    .upload-zone {
      transition: all .25s ease;
    }

    .upload-zone:hover {
      transform: scale(1.01);
      box-shadow: 0 4px 20px rgba(201, 135, 58, .15);
    }

    tbody tr {
      animation: fadeUp .35s ease both;
      transition: background .2s ease, transform .2s ease !important;
    }

    tbody tr:hover {
      transform: translateX(2px);
    }

    .badge {
      transition: all .2s cubic-bezier(.34, 1.2, .64, 1);
    }

    .badge:hover {
      transform: scale(1.08) translateY(-1px);
    }

    .form-group {
      position: relative;
    }

    .btn {
      overflow: hidden;
      position: relative;
    }

    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(105deg, transparent 40%, rgba(255, 255, 255, .25) 50%, transparent 60%);
      transform: translateX(-100%);
      transition: transform .5s ease;
    }

    .btn:hover::after {
      transform: translateX(100%);
    }

    .profile-avatar,
    .avatar-lg {
      transition: transform .4s cubic-bezier(.34, 1.56, .64, 1), box-shadow .3s ease !important;
    }

    .profile-avatar:hover,
    .avatar-lg:hover {
      transform: scale(1.08) rotate(-3deg) !important;
      box-shadow: 0 8px 32px rgba(201, 135, 58, .5) !important;
    }

    .conn-card,
    .peer-card,
    .req-card {
      transition: all .22s ease;
    }

    .conn-card:hover,
    .peer-card:hover,
    .req-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 32px rgba(26, 18, 8, .14);
      border-color: rgba(201, 135, 58, .25);
    }

    .opt-item,
    .opt-label {
      transition: all .2s cubic-bezier(.34, 1.2, .64, 1) !important;
    }

    .opt-item:hover,
    .opt-label:hover {
      transform: translateX(4px) !important;
    }

    .progress-fill {
      background: linear-gradient(90deg, var(--gold), var(--gold2), var(--gold3));
      background-size: 200% 100%;
      animation: shimmerBar 2.5s ease infinite !important;
    }

    @keyframes shimmerBar {
      0% {
        background-position: 100% 0;
      }

      100% {
        background-position: -100% 0;
      }
    }

    .modal {
      animation: modalIn .35s cubic-bezier(.34, 1.56, .64, 1) both !important;
    }

    .rank-list li:nth-child(1) {
      animation-delay: .0s;
    }

    .rank-list li:nth-child(2) {
      animation-delay: .06s;
    }

    .rank-list li:nth-child(3) {
      animation-delay: .12s;
    }

    .rank-list li:nth-child(4) {
      animation-delay: .18s;
    }

    /* ===== END ENHANCED ANIMATIONS ===== */
  </style>
</head>

<body>

  <header class="site-header">
    <a class="logo" href="dashboard.html">
      <div class="logo-icon">📚</div> Study Buddy
    </a>
    <button class="hamburger" onclick="this.nextElementSibling.classList.toggle('open')">☰</button>
    <nav class="main-nav">
      <a href="dashboard.html">Dashboard</a>
      <a href="notes.html">Notes</a>
      <a href="planner.html">Planner</a>
      <a href="test.html">Tests</a>
      <a href="connection.html" class="active">Connect</a>
      <a href="profile.html">Profile</a>
    </nav>
  </header>

  <div class="page-wrap">
    <div class="connect-layout">

      <!-- Sidebar -->
      <div class="sidebar-tabs fade-up">
        <h3>Connect</h3>
        <div class="stab active" onclick="showSection('find', this)"><span class="ti">🔗</span> Find Partners</div>
        <div class="stab" onclick="showSection('chat', this)"><span class="ti">💬</span> Chat</div>
        <div class="stab" onclick="showSection('groups', this)"><span class="ti">👥</span> Groups</div>
      </div>

      <!-- Main content -->
      <div>

        <!-- Find partners -->
        <div class="connect-section active" id="sec-find">
          <div class="card fade-up">
            <h3 style="margin-bottom:1rem;">Find Study Partners</h3>
            <div style="display:flex;gap:.8rem;flex-wrap:wrap;">
              <select id="matchSubject" style="flex:1;min-width:160px;">
                <option value="">Select a subject</option>
                <option value="DBMS">DBMS</option>
                <option value="Operating System">Operating System</option>
                <option value="Computer Networking">Computer Networking</option>
                <option value="Data Structures">Data Structures</option>
                <option value="Web Development">Web Development</option>
                <option value="Mathematics">Mathematics</option>
              </select>
              <button class="btn btn-primary" onclick="findMatches()">Find Matches</button>
            </div>
            <div class="match-grid" id="matchGrid"></div>
          </div>

          <!-- Subject groups -->
          <div class="card fade-up" style="margin-top:1.2rem;">
            <h3 style="margin-bottom:.9rem;">Subject Groups</h3>
            <div id="subjectGroups" style="display:flex;flex-wrap:wrap;gap:.5rem;"></div>
          </div>

          <!-- Requests -->
          <div class="card fade-up" style="margin-top:1.2rem;">
            <h3 style="margin-bottom:.9rem;">Connection Requests</h3>
            <div id="requestsList">
              <p style="color:var(--ink3);font-size:.88rem;">No pending requests</p>
            </div>
          </div>
        </div>

        <!-- Chat -->
        <div class="connect-section" id="sec-chat">
          <div class="chat-shell fade-up">
            <div class="user-list" id="userList"></div>
            <div class="chat-area">
              <div class="chat-head" id="chatHead">Select a student to chat</div>
              <div id="typingIndicator"
                style="display:none;font-size:.8rem;color:var(--ink3);padding:.5rem 1rem;font-style:italic;">✏️
                typing...</div>
              <div class="chat-msgs" id="chatMsgs"></div>
              <div class="chat-input-row">
                <input type="text" id="msgInput" placeholder="Type a message…"
                  onkeydown="if(event.key==='Enter')sendMsg()"
                  onkeyup="if(ws && ws.readyState===1) ws.send(JSON.stringify({type:'typing',target_user_id:activeUser,sender_name:currentUser.name}))">
                <input type="file" id="attachmentFile" style="display:none;" onchange="uploadChatAttachment()">
                <button class="btn btn-secondary btn-sm" title="Attach file"
                  onclick="document.getElementById('attachmentFile').click()">📎</button>
                <button class="btn btn-primary btn-sm" onclick="sendMsg()">➤</button>
              </div>
            </div>
          </div>
        </div>

        <!-- Groups -->
        <div class="connect-section" id="sec-groups">
          <div class="card fade-up" style="margin-bottom:1.2rem;">
            <h3 style="margin-bottom:1rem;">Create a Study Group</h3>
            <div style="display:flex;gap:.8rem;flex-wrap:wrap;">
              <input type="text" id="groupNameInput" placeholder="Group name" style="flex:1;min-width:180px;">
              <button class="btn btn-primary" onclick="createGroup()">Create</button>
            </div>
          </div>
          <div id="groupListEl" class="group-list fade-up"></div>

          <!-- Group chat -->
          <div id="groupChatArea" style="display:none;margin-top:1.2rem;">
            <div class="card">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
                <h3 id="groupChatTitle"></h3>
                <button class="btn btn-secondary btn-sm" onclick="leaveGroup()">Leave</button>
              </div>
              <div id="groupMsgs"
                style="min-height:140px;max-height:280px;overflow-y:auto;display:flex;flex-direction:column;gap:.4rem;margin-bottom:.9rem;">
              </div>
              <div style="display:flex;gap:.6rem;flex-wrap:wrap;">
                <input type="text" id="groupMsgInput" placeholder="Group message…"
                  onkeydown="if(event.key==='Enter')sendGroupMsg()" style="flex:1;min-width:180px;">
                <input type="file" id="groupAttachmentFile" style="display:none;" onchange="uploadGroupAttachment()">
                <button class="btn btn-secondary btn-sm" title="Attach file"
                  onclick="document.getElementById('groupAttachmentFile').click()">📎</button>
                <button class="btn btn-primary" onclick="sendGroupMsg()">Send</button>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <footer class="site-footer">© 2026 Study Buddy · Your learning companion 😊</footer>
  <div class="toast" id="toast"></div>

  <script src="api.js"></script>
  <script>
    // ─── Real-Time Chat System with WebSocket ────────────────────

    const SUBJECTS = [
      'DBMS', 'Operating System', 'Computer Networking',
      'Data Structures', 'Web Development', 'Mathematics'
    ];

    let activeUser = null;
    let activeGroup = null;
    let currentUser = null;
    const allMessages = {};
    let groups = [];
    let ws = null;

    // ─── Initialize WebSocket Connection ─────────────────────────

    function initWebSocket() {
      const token = localStorage.getItem('auth_token');
      if (!token) return;

      ws = new WebSocket(`ws://${window.location.hostname}:3000`);

      ws.onopen = () => {
        console.log('✅ Connected to WebSocket');
        // Authenticate connection
        ws.send(JSON.stringify({ type: 'auth', token }));
      };

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);

        switch (data.type) {
          case 'auth':
            if (data.success) console.log('✅ WebSocket authenticated');
            break;

          case 'direct_message':
            // Receive message from connected user
            handleReceivedDirectMessage(data);
            break;

          case 'message_confirmed':
            // Message was sent successfully
            console.log('✅ Message confirmed');
            break;

          case 'group_message':
            // Receive group message
            handleReceivedGroupMessage(data);
            break;

          case 'user_typing':
            // Show typing indicator
            showTypingIndicator(data);
            break;
        }
      };

      ws.onerror = (err) => console.error('WebSocket error:', err);
      ws.onclose = () => {
        console.log('❌ WebSocket disconnected');
        setTimeout(initWebSocket, 3000); // Reconnect after 3s
      };
    }

    // ─── Handle Received Direct Message ─────────────────────────

    function handleReceivedDirectMessage(data) {
      const { sender_id, sender_name, content, attachment_url } = data;

      // Store in allMessages
      if (!allMessages[sender_id]) allMessages[sender_id] = [];

      allMessages[sender_id].push({
        from: 'them',
        text: content,
        attachment_url,
        timestamp: new Date().toLocaleTimeString()
      });

      // If chat is open with this user, update UI
      if (activeUser === sender_id) {
        renderMsgs();
      }

      // Play notification sound
      playNotification();
    }

    // ─── Handle Received Group Message ──────────────────────────

    function handleReceivedGroupMessage(data) {
      const { group_id, sender_id, sender_name, content, attachment_url } = data;

      // Find group and update messages
      const group = groups.find(g => g.id === group_id);
      if (group) {
        if (!group.messages) group.messages = [];
        group.messages.push({
          sender_id,
          sender_name,
          content,
          attachment_url,
          timestamp: new Date().toLocaleTimeString()
        });

        // If group is open, update UI
        if (activeGroup !== null && groups[activeGroup].id === group_id) {
          renderGroupMsgs(group.messages);
        }

        playNotification();
      }
    }

    // ─── Show Typing Indicator ──────────────────────────────────

    function showTypingIndicator(data) {
      const { sender_name } = data;
      const typingEl = document.getElementById('typingIndicator');
      if (typingEl) {
        typingEl.textContent = `${sender_name} is typing...`;
        typingEl.style.display = 'block';
        setTimeout(() => {
          typingEl.style.display = 'none';
        }, 3000);
      }
    }

    // ─── Play Notification Sound ────────────────────────────────

    function playNotification() {
      const audio = new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAAB9AAACABAAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj==');
      audio.play().catch(() => { });
    }

    // ─── Initialize on Page Load ────────────────────────────────

    document.addEventListener('DOMContentLoaded', () => {
      checkAuth();
      const user = JSON.parse(localStorage.getItem('user') || '{}');
      currentUser = user;

      initWebSocket();
      loadPendingRequests();
      loadConnections();
      loadGroups();
      populateSubjectGroups();
    });

    // ─── Utility Functions ──────────────────────────────────────

    function showToast(msg, type = '') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast show ' + type;
      setTimeout(() => t.classList.remove('show'), 3200);
    }

    function showSection(id, el) {
      document.querySelectorAll('.connect-section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.stab').forEach(s => s.classList.remove('active'));
      document.getElementById('sec-' + id).classList.add('active');
      el.classList.add('active');
    }

    // ─── Find Study Partners ────────────────────────────────────

    async function findMatches() {
      const subj = document.getElementById('matchSubject').value;
      if (!subj) return showToast('Select a subject first', 'error');

      try {
        const data = await fetchAPI(`/students/by-subject/${encodeURIComponent(subj)}`);
        if (data.success) {
          renderMatches(data.students, subj);
        } else {
          showToast('No students found with your course', 'info');
          renderMatches([], subj);
        }
      } catch (err) {
        showToast('Error finding matches', 'error');
        console.error(err);
      }
    }

    function renderMatches(students, subject) {
      const grid = document.getElementById('matchGrid');
      if (!students || students.length === 0) {
        grid.innerHTML = '<p style="color:var(--ink3);grid-column:1/-1;margin-top:.5rem;">No other students with same course found</p>';
        return;
      }

      grid.innerHTML = students.map(s => `
    <div class="match-card">
      <div class="match-avatar">👤</div>
      <div class="match-name">${s.name}</div>
      <div class="match-sub">${s.course} - ${s.semester}</div>
      <button class="btn btn-primary btn-sm" onclick="sendConnectionRequest(${s.id}, '${s.name}', '${subject}')">
        🔗 Connect
      </button>
    </div>
  `).join('');
    }

    async function sendConnectionRequest(receiverId, name, subject) {
      try {
        const data = await fetchAPI('/connections/request', {
          method: 'POST',
          body: JSON.stringify({ receiver_id: receiverId, subject })
        });

        if (data.success) {
          showToast(`Request sent to ${name}! ✨ Waiting for confirmation...`, 'success');
        } else {
          showToast(data.error || 'Failed to send request', 'error');
        }
      } catch (err) {
        showToast('Error sending request', 'error');
        console.error(err);
      }
    }

    // ─── Pending Requests ───────────────────────────────────────

    async function loadPendingRequests() {
      try {
        const data = await fetchAPI('/connections/requests');
        if (data.success) {
          renderPendingRequests(data.requests);
        }
      } catch (err) {
        console.error('Error loading requests:', err);
      }
    }

    function renderPendingRequests(requests) {
      const el = document.getElementById('requestsList');
      if (!requests || requests.length === 0) {
        el.innerHTML = '<p style="color:var(--ink3);font-size:.88rem;">No pending requests</p>';
        return;
      }

      el.innerHTML = requests.map(req => `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem;margin-bottom:.8rem;display:flex;justify-content:space-between;align-items:center;">
      <div>
        <div style="font-weight:600;margin-bottom:.3rem;">${req.name}</div>
        <div style="font-size:.85rem;color:var(--ink3);">${req.course} - ${req.semester}</div>
        <div style="font-size:.8rem;color:var(--gold);margin-top:.3rem;">Subject: ${req.subject || 'General Partnership'}</div>
      </div>
      <div style="display:flex;gap:.5rem;">
        <button class="btn btn-primary btn-sm" onclick="acceptRequest(${req.id})">✅ Accept</button>
        <button class="btn btn-secondary btn-sm" onclick="rejectRequest(${req.id})">❌ Reject</button>
      </div>
    </div>
  `).join('');
    }

    async function acceptRequest(requestId) {
      try {
        const data = await fetchAPI(`/connections/accept/${requestId}`, {
          method: 'POST'
        });

        if (data.success) {
          showToast('Connection accepted! 🎉', 'success');
          loadPendingRequests();
          loadConnections();
        } else {
          showToast(data.error || 'Failed to accept', 'error');
        }
      } catch (err) {
        showToast('Error accepting request', 'error');
        console.error(err);
      }
    }

    async function rejectRequest(requestId) {
      try {
        const data = await fetchAPI(`/connections/reject/${requestId}`, {
          method: 'POST'
        });

        if (data.success) {
          showToast('Request rejected', 'info');
          loadPendingRequests();
        } else {
          showToast(data.error || 'Failed to reject', 'error');
        }
      } catch (err) {
        showToast('Error rejecting request', 'error');
        console.error(err);
      }
    }

    // ─── Chat with Connected Students ──────────────────────────

    async function loadConnections() {
      try {
        const data = await fetchAPI('/connections');
        if (data.success) {
          renderConnectedStudents(data.connections);
        }
      } catch (err) {
        console.error('Error loading connections:', err);
      }
    }

    function renderConnectedStudents(connections) {
      if (!connections || connections.length === 0) {
        document.getElementById('userList').innerHTML = '<p style="padding:1rem;color:var(--ink3);font-size:.88rem;">No connections yet. Check pending requests!</p>';
        return;
      }
      window.connectedStudents = connections;
      loadChatUsers(connections);
    }

    function loadChatUsers(connections) {
      const userList = document.getElementById('userList');
      if (!userList) return;

      userList.innerHTML = connections.map(conn => `
    <div class="user-item" id="ui_${conn.user_id}" onclick="openChat(${conn.user_id}, '${conn.user.name}')">
      <div class="un">👤 ${conn.user.name}</div>
      <div class="ul">${conn.user.course || 'Student'}</div>
    </div>
  `).join('');
    }

    function openChat(userId, name) {
      activeUser = userId;
      document.querySelectorAll('.user-item').forEach(i => i.classList.remove('active'));
      const elem = document.getElementById('ui_' + userId);
      if (elem) elem.classList.add('active');
      document.getElementById('chatHead').textContent = '💬 ' + name;
      renderMsgs();
    }

    function renderMsgs() {
      const msgs = allMessages[activeUser] || [];
      document.getElementById('chatMsgs').innerHTML = msgs.map(m => `
    <div class="msg ${m.from === 'me' ? 'me' : 'them'}">
      ${m.text}
      ${m.attachment_url ? `<a href="${m.attachment_url}" class="msg-attachment" target="_blank">📎 View Attachment</a>` : ''}
    </div>
  `).join('');
      const el = document.getElementById('chatMsgs');
      if (el) el.scrollTop = el.scrollHeight;
    }

    function sendMsg() {
      if (!activeUser) return showToast('Select a student first', 'error');
      const input = document.getElementById('msgInput');
      const text = input.value.trim();
      if (!text && !document.getElementById('attachmentFile').files.length) return;

      // Add to local display immediately
      if (!allMessages[activeUser]) allMessages[activeUser] = [];
      allMessages[activeUser].push({
        from: 'me',
        text: text || '📎 Attachment',
        timestamp: new Date().toLocaleTimeString()
      });
      renderMsgs();
      input.value = '';
      document.getElementById('attachmentFile').value = '';

      // Send via WebSocket
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
          type: 'direct_message',
          receiver_id: activeUser,
          content: text,
          attachment_url: null
        }));
      }
    }

    // ─── File Upload for Chat ────────────────────────────────────

    async function uploadChatAttachment() {
      const input = document.getElementById('attachmentFile');
      if (!input.files.length) return;

      const formData = new FormData();
      formData.append('file', input.files[0]);

      try {
        const response = await fetch('/api/upload', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${localStorage.getItem('auth_token')}`
          },
          body: formData
        });

        const data = await response.json();

        if (data.success) {
          // Send message with attachment
          const msgInput = document.getElementById('msgInput');
          const text = msgInput.value.trim();

          if (!allMessages[activeUser]) allMessages[activeUser] = [];
          allMessages[activeUser].push({
            from: 'me',
            text: text || input.files[0].name,
            attachment_url: data.url,
            timestamp: new Date().toLocaleTimeString()
          });
          renderMsgs();
          msgInput.value = '';
          input.value = '';

          // Send via WebSocket
          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({
              type: 'direct_message',
              receiver_id: activeUser,
              content: text,
              attachment_url: data.url
            }));
          }
        }
      } catch (err) {
        showToast('Error uploading file', 'error');
        console.error(err);
      }
    }

    // ─── Study Groups ──────────────────────────────────────────

    function populateSubjectGroups() {
      document.getElementById('subjectGroups').innerHTML = SUBJECTS.map(s =>
        `<button class="btn btn-secondary btn-sm" onclick="joinSubjectGroup('${s}')">${s}</button>`
      ).join('');
    }

    async function loadGroups() {
      try {
        const data = await fetchAPI('/groups');
        if (data.success) {
          groups = data.groups.map(g => ({ ...g, messages: [] }));
          renderGroups();
        }
      } catch (err) {
        console.error('Error loading groups:', err);
      }
    }

    function renderGroups() {
      const el = document.getElementById('groupListEl');
      if (!groups || groups.length === 0) {
        el.innerHTML = '<p style="color:var(--ink3);">No groups yet. Create one to get started!</p>';
        return;
      }

      el.innerHTML = groups.map((g, i) => `
    <div class="group-item ${activeGroup === i ? 'active' : ''}" onclick="openGroup(${i})">
      <div class="group-icon">👥</div>
      <div class="group-info">
        <div class="gn">${g.name}</div>
        <div class="gm">${g.memberCount} members${g.subject ? ' · ' + g.subject : ''}</div>
      </div>
    </div>
  `).join('');
    }

    async function createGroup() {
      const name = document.getElementById('groupNameInput').value.trim();
      if (!name) return showToast('Enter a group name', 'error');

      try {
        const data = await fetchAPI('/groups', {
          method: 'POST',
          body: JSON.stringify({ name })
        });

        if (data.success) {
          document.getElementById('groupNameInput').value = '';
          showToast(data.message, 'success');
          loadGroups();
        } else {
          showToast(data.error || 'Failed to create group', 'error');
        }
      } catch (err) {
        showToast('Error creating group', 'error');
        console.error(err);
      }
    }

    function openGroup(i) {
      activeGroup = i;
      const g = groups[i];
      document.getElementById('groupChatTitle').textContent = '👥 ' + g.name + (g.subject ? ` (${g.subject})` : '');
      document.getElementById('groupChatArea').style.display = 'block';
      loadGroupMessages(g.id);
      renderGroups();
    }

    async function loadGroupMessages(groupId) {
      try {
        const data = await fetchAPI(`/groups/${groupId}/messages`);
        if (data.success) {
          if (activeGroup !== null) {
            groups[activeGroup].messages = data.messages;
          }
          renderGroupMsgs(data.messages);
        }
      } catch (err) {
        console.error('Error loading group messages:', err);
      }
    }

    function renderGroupMsgs(messages) {
      if (!messages) return;
      document.getElementById('groupMsgs').innerHTML = messages.map(m =>
        `<div class="msg ${m.sender_id === currentUser.id ? 'me' : 'them'}">
      <strong>${m.sender_id === currentUser.id ? 'You' : m.sender_name}:</strong> ${m.content}
      ${m.attachment_url ? `<a href="${m.attachment_url}" class="msg-attachment" target="_blank">📎 File</a>` : ''}
    </div>`
      ).join('');

      const el = document.getElementById('groupMsgs');
      if (el) el.scrollTop = el.scrollHeight;
    }

    async function sendGroupMsg() {
      if (activeGroup == null) return;
      const input = document.getElementById('groupMsgInput');
      const text = input.value.trim();
      if (!text && !document.getElementById('groupAttachmentFile').files.length) return;

      try {
        const groupId = groups[activeGroup].id;
        const data = await fetchAPI(`/groups/${groupId}/messages`, {
          method: 'POST',
          body: JSON.stringify({ content: text })
        });

        if (data.success) {
          input.value = '';

          // Send via WebSocket for real-time delivery
          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({
              type: 'group_message',
              group_id: groupId,
              content: text,
              attachment_url: null
            }));
          }

          loadGroupMessages(groupId);
        } else {
          showToast(data.error || 'Failed to send message', 'error');
        }
      } catch (err) {
        showToast('Error sending message', 'error');
        console.error(err);
      }
    }

    // ─── Upload Group Attachment ─────────────────────────────────

    async function uploadGroupAttachment() {
      const input = document.getElementById('groupAttachmentFile');
      if (!input.files.length) return;

      const formData = new FormData();
      formData.append('file', input.files[0]);

      try {
        const response = await fetch('/api/upload', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${localStorage.getItem('token')}`
          },
          body: formData
        });

        const data = await response.json();

        if (data.success && activeGroup !== null) {
          const groupId = groups[activeGroup].id;
          const msgInput = document.getElementById('groupMsgInput');
          const text = msgInput.value.trim() || input.files[0].name;

          // Send to backend
          await fetchAPI(`/groups/${groupId}/messages`, {
            method: 'POST',
            body: JSON.stringify({ content: text, attachment_url: data.url })
          });

          msgInput.value = '';
          input.value = '';

          // Broadcast via WebSocket
          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({
              type: 'group_message',
              group_id: groupId,
              content: text,
              attachment_url: data.url
            }));
          }

          loadGroupMessages(groupId);
        }
      } catch (err) {
        showToast('Error uploading file', 'error');
        console.error(err);
      }
    }

    async function joinSubjectGroup(subject) {
      if (!groups.length) {
        // Create new group for subject
        try {
          const data = await fetchAPI('/groups', {
            method: 'POST',
            body: JSON.stringify({ name: `${subject} Study Group`, subject })
          });

          if (data.success) {
            showToast(`Created and joined "${subject}" group! 📚`, 'success');
            loadGroups();
          }
        } catch (err) {
          showToast('Error creating group', 'error');
        }
        return;
      }

      // Try to find existing group for this subject
      let subjectGroup = groups.find(g => g.subject === subject);

      if (subjectGroup) {
        try {
          const data = await fetchAPI(`/groups/${subjectGroup.id}/join`, {
            method: 'POST'
          });

          if (data.success) {
            showToast(`Joined "${subject}" group! 📚`, 'success');
            loadGroups();
          } else {
            showToast(data.error || 'Failed to join', 'error');
          }
        } catch (err) {
          showToast('Error joining group', 'error');
        }
      } else {
        // Create new group for subject
        try {
          const data = await fetchAPI('/groups', {
            method: 'POST',
            body: JSON.stringify({ name: `${subject} Study Group`, subject })
          });

          if (data.success) {
            showToast(`Created and joined "${subject}" group! 📚`, 'success');
            loadGroups();
          }
        } catch (err) {
          showToast('Error creating group', 'error');
        }
      }
    }

    function leaveGroup() {
      if (activeGroup == null) return;
      const groupId = groups[activeGroup].id;

      fetchAPI(`/groups/${groupId}/leave`, {
        method: 'POST'
      }).then(data => {
        if (data.success) {
          document.getElementById('groupChatArea').style.display = 'none';
          activeGroup = null;
          showToast('Left group', 'info');
          loadGroups();
        }
      }).catch(err => console.error(err));
    }
  </script>

  <script>
    // ===== GLOBAL ANIMATION ENHANCEMENTS =====
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
          observer.unobserve(e.target);
        }
      });
    }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

    document.querySelectorAll('.card, .stat-chip').forEach((el, i) => {
      if (!el.style.animationDelay) {
        el.style.animationDelay = (i * 0.05) + 's';
        el.style.animation = 'fadeUp .5s cubic-bezier(.4,0,.2,1) both';
        el.style.animationDelay = (i * 0.05) + 's';
      }
    });

    setTimeout(() => {
      document.querySelectorAll('.progress-fill[data-width]').forEach(el => {
        el.style.width = el.dataset.width;
      });
    }, 200);

    document.querySelectorAll('.btn').forEach(btn => {
      btn.addEventListener('click', function (e) {
        const r = document.createElement('span');
        const rect = this.getBoundingClientRect();
        r.style.cssText = `
      position:absolute;width:6px;height:6px;border-radius:50%;
      background:rgba(255,255,255,.5);
      left:${e.clientX - rect.left - 3}px;top:${e.clientY - rect.top - 3}px;
      animation:ripple .5s ease forwards;pointer-events:none;
    `;
        if (!document.querySelector('#rippleStyle')) {
          const s = document.createElement('style');
          s.id = 'rippleStyle';
          s.textContent = '@keyframes ripple{to{width:80px;height:80px;margin:-37px;opacity:0;}}';
          document.head.appendChild(s);
        }
        this.style.overflow = 'hidden'; this.style.position = 'relative';
        this.appendChild(r);
        setTimeout(() => r.remove(), 500);
      });
    });
    // ===== END GLOBAL ENHANCEMENTS =====
  </script>

</body>

</html>
