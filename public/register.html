<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — Study Buddy</title>
<link rel="stylesheet" href="style.css">
<style>
  body { display: flex; flex-direction: column; min-height: 100vh; background: linear-gradient(135deg, #1a1208 0%, #2f1f0a 100%); }
  
  .reg-container {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 2rem 1rem;
  }

  .reg-shell {
    max-width: 500px; width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px; overflow: hidden;
    box-shadow: 0 24px 80px rgba(26,18,8,.18);
    animation: scaleIn .5s cubic-bezier(.34,1.2,.64,1) both;
  }

  @keyframes scaleIn {
    from { opacity: 0; transform: scale(.92); }
    to { opacity: 1; transform: scale(1); }
  }

  .reg-header {
    background: linear-gradient(160deg, #1a1208 0%, #2f1f0a 100%);
    padding: 2rem; text-align: center; color: #fff;
  }

  .reg-header h1 { margin: 0 0 0.5rem 0; font-size: 1.8rem; }
  .reg-header p { margin: 0; color: rgba(255,255,255,.7); font-size: 0.9rem; }

  .reg-body { padding: 2rem; }

  .form-group { margin-bottom: 1.2rem; }
  .form-group label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--ink); font-size: 0.95rem; }
  .form-group input,
  .form-group select {
    width: 100%; padding: 0.8rem; border: 1px solid var(--border);
    border-radius: 8px; background: var(--bg); color: var(--ink);
    font-family: inherit; font-size: 1rem;
    transition: border-color 0.3s ease;
  }

  .form-group input:focus,
  .form-group select:focus {
    outline: none; border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,135,58,.1);
  }

  .form-group.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .form-group.two-col > div { margin-bottom: 0; }

  .btn-register {
    width: 100%; padding: 1rem;
    background: linear-gradient(135deg, var(--gold), #e8b06b);
    color: #1a1208; border: none;
    border-radius: 8px; font-weight: 700;
    font-size: 1rem; cursor: pointer;
    transition: all 0.3s ease;
    margin-top: 1.5rem;
  }

  .btn-register:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(201,135,58,.3);
  }

  .login-link {
    text-align: center; margin-top: 1.5rem; padding-top: 1.5rem;
    border-top: 1px solid var(--border);
    color: var(--ink3);
  }

  .login-link a {
    color: var(--gold); text-decoration: none; font-weight: 600;
    transition: color 0.3s ease;
  }

  .login-link a:hover { color: #e8b06b; }

  .required { color: #e67e22; }
</style>
</head>
<body>
  <div class="reg-container">
    <div class="reg-shell">
      <div class="reg-header">
        <h1>📚 Join Study Buddy</h1>
        <p>Create your student account</p>
      </div>

      <div class="reg-body">
        <form onsubmit="event.preventDefault(); registerStudent();">
          <div class="form-group">
            <label>Full Name <span class="required">*</span></label>
            <input type="text" id="reg-name" placeholder="Your full name" required>
          </div>

          <div class="form-group">
            <label>Email <span class="required">*</span></label>
            <input type="email" id="reg-email" placeholder="university@email.com" required>
          </div>

          <div class="form-group">
            <label>Password <span class="required">*</span></label>
            <input type="password" id="reg-password" placeholder="Create a strong password" required>
          </div>

          <div class="form-group">
            <label>Course <span class="required">*</span></label>
            <select id="reg-course" required>
              <option value="">-- Select Course --</option>
              <option value="BCA">BCA (Bachelor of Computer Applications)</option>
              <option value="B.Tech">B.Tech (Computer Science)</option>
              <option value="M.Tech">M.Tech (Computer Science)</option>
              <option value="B.Sc">B.Sc (Computer Science)</option>
              <option value="Other">Other</option>
            </select>
          </div>

          <div class="form-group">
            <label>Semester <span class="required">*</span></label>
            <select id="reg-semester" required>
              <option value="">-- Select Semester --</option>
              <option value="Semester I">Semester I</option>
              <option value="Semester II">Semester II</option>
              <option value="Semester III">Semester III</option>
              <option value="Semester IV">Semester IV</option>
              <option value="Semester V">Semester V</option>
              <option value="Semester VI">Semester VI</option>
              <option value="Semester VII">Semester VII</option>
              <option value="Semester VIII">Semester VIII</option>
            </select>
          </div>

          <button type="submit" class="btn-register">✨ Create Account</button>
        </form>

        <div class="login-link">
          Already have an account? <a href="index.html">Login here</a>
        </div>
      </div>
    </div>
  </div>

  <script src="api.js"></script>
</body>
</html>
